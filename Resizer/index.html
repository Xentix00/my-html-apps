<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>resize</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #1a1a1a;
    --border: rgba(255,255,255,0.08);
    --handle: rgba(255,255,255,0.7);
    --handle-hover: #fff;
    --accent: #e8ff47;
    --text: rgba(255,255,255,0.35);
    --text-dim: rgba(255,255,255,0.15);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    overflow: hidden;
    user-select: none;
    cursor: default;
  }

  /* ── UPLOAD SCREEN ── */
  #upload-screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0;
    transition: opacity 0.4s ease, transform 0.4s ease;
    z-index: 10;
  }
  #upload-screen.hidden {
    opacity: 0; pointer-events: none; transform: scale(0.97);
  }

  #drop-zone {
    width: 340px; height: 240px;
    border: 1px solid var(--border);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 18px;
    cursor: pointer;
    position: relative;
    transition: border-color 0.2s, background 0.2s;
    background: var(--surface);
  }
  #drop-zone:hover, #drop-zone.drag-over {
    border-color: rgba(255,255,255,0.25);
    background: #202020;
  }
  #drop-zone.drag-over { border-color: var(--accent); }

  .dz-icon {
    width: 36px; height: 36px; opacity: 0.18;
  }
  .dz-label {
    font-size: 11px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--text-dim);
    line-height: 1.8; text-align: center;
  }
  .dz-label span { display: block; font-size: 9px; opacity: 0.6; }

  #file-input { display: none; }

  .meta-line {
    margin-top: 18px;
    font-size: 9px; letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    opacity: 0.5;
  }

  /* ── EDITOR SCREEN ── */
  #editor-screen {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.4s ease;
  }
  #editor-screen.visible {
    opacity: 1; pointer-events: all;
  }

  /* canvas / stage */
  #stage {
    position: relative;
    display: inline-block;
    line-height: 0;
  }

  #img-el {
    display: block;
    width: 100%; height: 100%;
    object-fit: fill;
    pointer-events: none;
    image-rendering: auto;
  }

  /* resize handles */
  .handle {
    position: absolute;
    width: 10px; height: 10px;
    background: var(--handle);
    border: 1px solid rgba(0,0,0,0.5);
    border-radius: 1px;
    z-index: 20;
    transition: background 0.15s, transform 0.15s;
  }
  .handle:hover { background: var(--handle-hover); transform: scale(1.3); }

  /* corner handles */
  .handle[data-d="nw"] { top: -5px; left: -5px; cursor: nw-resize; }
  .handle[data-d="ne"] { top: -5px; right: -5px; cursor: ne-resize; }
  .handle[data-d="se"] { bottom: -5px; right: -5px; cursor: se-resize; }
  .handle[data-d="sw"] { bottom: -5px; left: -5px; cursor: sw-resize; }

  /* edge handles */
  .handle[data-d="n"]  { top: -5px; left: calc(50% - 5px); cursor: n-resize; }
  .handle[data-d="e"]  { right: -5px; top: calc(50% - 5px); cursor: e-resize; }
  .handle[data-d="s"]  { bottom: -5px; left: calc(50% - 5px); cursor: s-resize; }
  .handle[data-d="w"]  { left: -5px; top: calc(50% - 5px); cursor: w-resize; }

  /* thin border around image */
  #stage::after {
    content: '';
    position: absolute; inset: 0;
    border: 1px solid rgba(255,255,255,0.12);
    pointer-events: none;
  }

  /* ── HUD ── */
  #hud {
    position: fixed; bottom: 22px; left: 50%;
    transform: translateX(-50%);
    display: flex; align-items: center; gap: 20px;
    font-size: 10px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--text-dim);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s 0.5s;
  }
  #hud.visible { opacity: 1; pointer-events: all; }

  #size-readout { min-width: 90px; text-align: center; }

  .hud-sep { opacity: 0.3; }

  #btn-reset, #btn-save, #btn-new {
    background: none; border: none; outline: none;
    font: inherit; color: inherit; letter-spacing: inherit;
    text-transform: inherit; cursor: pointer;
    padding: 4px 0;
    pointer-events: all;
    opacity: 0.5;
    transition: opacity 0.15s, color 0.15s;
  }
  #btn-reset:hover, #btn-new:hover { opacity: 1; }
  #btn-save:hover { opacity: 1; color: var(--accent); }

  /* lock-ratio indicator */
  #lock-indicator {
    font-size: 9px; letter-spacing: 0.15em;
    opacity: 0.4; cursor: pointer;
    pointer-events: all;
    transition: opacity 0.15s, color 0.15s;
  }
  #lock-indicator:hover { opacity: 0.9; }
  #lock-indicator.locked { color: var(--accent); opacity: 0.8; }

  /* ── drag-move cursor override ── */
  #stage.moving { cursor: move !important; }
  #stage.moving * { cursor: move !important; }

  /* ── keyboard hint ── */
  #hint {
    position: fixed; top: 18px; right: 22px;
    font-size: 9px; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--text-dim);
    opacity: 0;
    transition: opacity 0.4s 0.7s;
    pointer-events: none;
    text-align: right; line-height: 1.9;
  }
  #hint.visible { opacity: 0.4; }
</style>

    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Resizer">
    <link rel="apple-touch-icon" href="icon.png">
    <script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}</script>
</head>
<body>

<!-- ── UPLOAD ── -->
<div id="upload-screen">
  <div id="drop-zone">
    <svg class="dz-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="1" y="1" width="34" height="34" rx="2" stroke="white" stroke-width="1.5"/>
      <circle cx="12" cy="12" r="3" fill="white"/>
      <path d="M1 24L11 14L18 21L24 15L35 26" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
    </svg>
    <div class="dz-label">
      Drop image here<br>or click to browse
      <span>png · jpg · webp · gif · avif</span>
    </div>
  </div>
  <p class="meta-line">image resizer — no upload, runs locally</p>
  <input type="file" id="file-input" accept="image/*">
</div>

<!-- ── EDITOR ── -->
<div id="editor-screen">
  <div id="stage">
    <img id="img-el" src="" alt="">
    <!-- handles injected by JS -->
  </div>
</div>

<div id="hud">
  <button id="btn-new">New</button>
  <span class="hud-sep">·</span>
  <span id="size-readout">0 × 0</span>
  <span class="hud-sep">·</span>
  <span id="lock-indicator" class="locked" title="Toggle aspect ratio lock">⌗ Locked</span>
  <span class="hud-sep">·</span>
  <button id="btn-reset">Reset</button>
  <span class="hud-sep">·</span>
  <button id="btn-save">Save PNG</button>
</div>

<div id="hint">
  Shift — free resize<br>
  Alt/Opt — resize from center
</div>

<script>
(() => {
  const uploadScreen = document.getElementById('upload-screen');
  const editorScreen = document.getElementById('editor-screen');
  const dropZone    = document.getElementById('drop-zone');
  const fileInput   = document.getElementById('file-input');
  const stage       = document.getElementById('stage');
  const imgEl       = document.getElementById('img-el');
  const hud         = document.getElementById('hud');
  const hint        = document.getElementById('hint');
  const sizeReadout = document.getElementById('size-readout');
  const btnReset    = document.getElementById('btn-reset');
  const btnSave     = document.getElementById('btn-save');
  const btnNew      = document.getElementById('btn-new');
  const lockIndicator = document.getElementById('lock-indicator');

  let naturalW = 0, naturalH = 0;
  let stageW = 0, stageH = 0;
  let aspectRatio = 1;
  let locked = true;
  let originalSrc = '';

  // ── Upload ──────────────────────────────────────────────────────
  dropZone.addEventListener('click', () => fileInput.click());

  dropZone.addEventListener('dragover', e => {
    e.preventDefault(); dropZone.classList.add('drag-over');
  });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadFile(file);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) loadFile(fileInput.files[0]);
  });

  function loadFile(file) {
    const url = URL.createObjectURL(file);
    originalSrc = url;
    const tmp = new Image();
    tmp.onload = () => {
      naturalW = tmp.naturalWidth;
      naturalH = tmp.naturalHeight;
      aspectRatio = naturalW / naturalH;

      // fit inside viewport with some padding
      const vw = window.innerWidth  - 80;
      const vh = window.innerHeight - 80;
      const scale = Math.min(1, vw / naturalW, vh / naturalH);
      stageW = Math.round(naturalW * scale);
      stageH = Math.round(naturalH * scale);

      imgEl.src = url;
      applySize(stageW, stageH);
      enterEditor();
    };
    tmp.src = url;
  }

  function applySize(w, h) {
    stageW = Math.max(20, Math.round(w));
    stageH = Math.max(20, Math.round(h));
    stage.style.width  = stageW + 'px';
    stage.style.height = stageH + 'px';
    sizeReadout.textContent = `${stageW} × ${stageH}`;
  }

  function enterEditor() {
    uploadScreen.classList.add('hidden');
    editorScreen.classList.add('visible');
    hud.classList.add('visible');
    hint.classList.add('visible');
  }

  // ── Build handles ──────────────────────────────────────────────
  const DIRS = ['nw','n','ne','e','se','s','sw','w'];
  DIRS.forEach(d => {
    const h = document.createElement('div');
    h.className = 'handle';
    h.dataset.d = d;
    stage.appendChild(h);
    h.addEventListener('mousedown', startResize);
    h.addEventListener('touchstart', startResize, { passive: false });
  });

  // ── Resize ─────────────────────────────────────────────────────
  let resizing = false;
  let resizeDir = '';
  let startX, startY, startW, startH, startLeft, startTop;
  let stageLeft, stageTop;

  function startResize(e) {
    e.preventDefault();
    resizing = true;
    resizeDir = e.currentTarget.dataset.d;

    const pt = e.touches ? e.touches[0] : e;
    startX = pt.clientX;
    startY = pt.clientY;
    startW = stageW;
    startH = stageH;

    const rect = stage.getBoundingClientRect();
    stageLeft = rect.left;
    stageTop  = rect.top;

    document.addEventListener('mousemove', onResize);
    document.addEventListener('touchmove',  onResize, { passive: false });
    document.addEventListener('mouseup',   stopResize);
    document.addEventListener('touchend',  stopResize);
  }

  function onResize(e) {
    if (!resizing) return;
    e.preventDefault();
    const pt = e.touches ? e.touches[0] : e;
    const dx = pt.clientX - startX;
    const dy = pt.clientY - startY;
    const shiftFree = e.shiftKey;
    const d = resizeDir;

    let newW = startW, newH = startH;

    if (d.includes('e')) newW = startW + dx;
    if (d.includes('s')) newH = startH + dy;
    if (d.includes('w')) newW = startW - dx;
    if (d.includes('n')) newH = startH - dy;

    newW = Math.max(20, newW);
    newH = Math.max(20, newH);

    // aspect-ratio lock (unless shift)
    if (locked && !shiftFree) {
      // determine which dimension led
      if (d === 'n' || d === 's') {
        newW = newH * aspectRatio;
      } else if (d === 'e' || d === 'w') {
        newH = newW / aspectRatio;
      } else {
        // corner — use the larger delta to decide
        const wByH = newH * aspectRatio;
        const hByW = newW / aspectRatio;
        if (Math.abs(newW - startW) >= Math.abs(newH - startH)) {
          newH = hByW;
        } else {
          newW = wByH;
        }
      }
    }

    applySize(newW, newH);
  }

  function stopResize() {
    resizing = false;
    document.removeEventListener('mousemove', onResize);
    document.removeEventListener('touchmove',  onResize);
    document.removeEventListener('mouseup',   stopResize);
    document.removeEventListener('touchend',  stopResize);
  }

  // ── Lock toggle ────────────────────────────────────────────────
  lockIndicator.addEventListener('click', () => {
    locked = !locked;
    lockIndicator.classList.toggle('locked', locked);
    lockIndicator.textContent = locked ? '⌗ Locked' : '⌗ Free';
    if (locked) aspectRatio = stageW / stageH;
  });

  // ── Reset ──────────────────────────────────────────────────────
  btnReset.addEventListener('click', () => {
    const vw = window.innerWidth  - 80;
    const vh = window.innerHeight - 80;
    const scale = Math.min(1, vw / naturalW, vh / naturalH);
    applySize(naturalW * scale, naturalH * scale);
    aspectRatio = stageW / stageH;
  });

  // ── New image ──────────────────────────────────────────────────
  btnNew.addEventListener('click', () => {
    editorScreen.classList.remove('visible');
    hud.classList.remove('visible');
    hint.classList.remove('visible');
    uploadScreen.classList.remove('hidden');
    imgEl.src = '';
    fileInput.value = '';
  });

  // ── Save PNG ───────────────────────────────────────────────────
  btnSave.addEventListener('click', () => {
    const canvas = document.createElement('canvas');
    canvas.width  = stageW;
    canvas.height = stageH;
    const ctx = canvas.getContext('2d');
    const tmp = new Image();
    tmp.crossOrigin = 'anonymous';
    tmp.onload = () => {
      ctx.drawImage(tmp, 0, 0, stageW, stageH);
      const a = document.createElement('a');
      a.download = `resized_${stageW}x${stageH}.png`;
      a.href = canvas.toDataURL('image/png');
      a.click();
    };
    tmp.src = originalSrc;
  });

  // ── Keyboard shortcuts ─────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') btnNew.click();
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault(); btnSave.click();
    }
  });

})();
</script>
</body>
</html>
